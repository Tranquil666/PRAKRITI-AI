services:
  - type: web
    name: prakriti-ml-app
    runtime: static
    buildCommand: echo "No build required"
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # HTML and the SW must revalidate on every load so users get updates.
      - path: /index.html
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /index_bootstrap.html
        name: Cache-Control
        value: no-cache, must-revalidate
      - path: /service-worker.js
        name: Cache-Control
        value: no-cache, must-revalidate

      # Static assets can be cached aggressively. Bump filenames or add hashes when they change.
      - path: /*.js
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.css
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.csv
        name: Cache-Control
        value: public, max-age=86400

      # Security headers. Applied to every response.
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), interest-cohort=()
      # CSP is also set via <meta> in the HTML; this header version applies to non-HTML responses.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
